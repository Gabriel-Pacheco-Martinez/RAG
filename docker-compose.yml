services:

  api_server:
    build: ./api_server
    volumes:
      - hf_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - nginx
      - redis
      - qdrant

  rag_server_1:
    build: ./rag_server
    volumes:
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - qdrant

  rag_server_2:
    build: ./rag_server
    volumes:
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - qdrant

  rag_server_3:
    build: ./rag_server
    volumes:
      - hf_cache:/root/.cache/huggingface
    depends_on:
      - qdrant

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8082:8082"
    depends_on:
      - rag_server_1
      - rag_server_2
      - rag_server_3
  
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
  hf_cache: