version: "3.9"

services:

  api_server:
    build: ./api_server
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - nginx
      - redis
      - qdrant

  rag_server_1:
    build: ./rag_server
    depends_on:
      - qdrant

  rag_server_2:
    build: ./rag_server
    depends_on:
      - qdrant

  rag_server_3:
    build: ./rag_server
    depends_on:
      - qdrant

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - rag_server_1
      - rag_server_2
      - rag_server_3
  
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"