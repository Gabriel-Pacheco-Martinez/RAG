version: "3.9"

services:

  api_server:
    build: ./api_server
    ports:
      - "8000:8000"
    depends_on:
      - nginx

  rag_server_1:
    build: ./rag_server

  rag_server_2:
    build: ./rag_server

  rag_server_3:
    build: ./rag_server

  nginx:
    image: nginx:latest
    ports:
      - "8000:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - rag_server_1
      - rag_server_2
      - rag_server_3